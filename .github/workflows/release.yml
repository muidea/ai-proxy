name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Release version (vX.Y.Z)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  # 同一 tag 被修正并重新推送时，取消旧构建，防止竞争同一个 Release。
  cancel-in-progress: true

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 手动重跑时 version 必须是已存在的 tag；不能从未审计的默认分支发布。
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify source once
        run: |
          scripts/check-format.sh
          go vet ./...
          go test ./... -count=1

  package:
    name: Package ${{ matrix.goos }}/${{ matrix.goarch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-14
            goos: darwin
            goarch: arm64
          - runner: windows-latest
            goos: windows
            goarch: amd64
    needs: verify
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 手动重跑时 version 必须是已存在的 tag；不能从未审计的默认分支发布。
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Resolve version
        id: version
        shell: bash
        run: |
          version='${{ inputs.version || github.ref_name }}'
          echo "value=${version#v}" >> "$GITHUB_OUTPUT"
      - name: Build release archive
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: scripts/build-release.sh "${{ steps.version.outputs.value }}" dist
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Resolve version
        id: version
        shell: bash
        run: |
          version='${{ inputs.version || github.ref_name }}'
          echo "tag=v${version#v}" >> "$GITHUB_OUTPUT"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.version.outputs.tag }}" dist/*.tar.gz dist/*.sha256 --generate-notes --title "${{ steps.version.outputs.tag }}"
