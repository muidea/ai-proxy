name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: scripts/check-format.sh
      - name: Verify dependencies
        run: go mod verify
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -count=1

  build:
    name: linux/amd64 build
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Native build and package
        shell: bash
        env:
          GOOS: linux
          GOARCH: amd64
        run: scripts/build-release.sh 0.0.0-ci dist
