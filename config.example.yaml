server:
  # 默认仅绑定 loopback。若改为 0.0.0.0:8080 / :8080 等非 loopback,
  # 必须同时配置 inbound_api_key,否则启动失败。
  listen_addr: 127.0.0.1:8080
  # 入站 API Key(可选于 loopback)。客户端用 Authorization: Bearer <key> 或 X-API-Key。
  # inbound_api_key: change-me
  # 请求体 / 上游响应大小上限(字节)。
  max_request_body_bytes: 33554432
  max_upstream_response_bytes: 67108864
  # 流式累计输出与单条 SSE 行上限。
  max_stream_bytes: 67108864
  max_sse_line_bytes: 1048576
  # 是否落盘完整请求/响应正文;false 时仅保留 metadata 等元数据。
  archive_full_content: true
  # 单进程本地文件;多副本请使用不同路径,勿共享同一 usage.csv。
  usage_file: usage.csv
  interaction_dir: interactions
  interaction_retention: 500
  debug_log: true
  log_format: text
  request_timeout_seconds: 300
  stream_idle_timeout_seconds: 300
  # 可观测性端点(/metrics, /stats)访问控制。默认仅 loopback 可访问,
  # 在受信内网可以设为 true 开放给 Prometheus / TUI 拉取。
  metrics_remote_access: false
  # 可选:白名单 CIDR 列表(逗号分隔),仅在 metrics_remote_access=true 时生效。
  # 非空:仅允许列表内网段(+loopback);空:允许任意远程来源。
  metrics_allowed_cidrs:
  # SLO 阈值:任一字段保持 0 即禁用对应规则。
  # slo_cache_hit_rate_min: 单 provider 最低缓存命中率(0~1),样本不足 10 跳过。
  # slo_upstream_error_rate_max: 单 provider 最高上游错误率(0~1)。
  # slo_p99_latency_max_ms: 单 provider p99 延迟上限(毫秒)。
  # slo_check_interval_seconds: 后台巡检周期,0 表示禁用周期检查。
  # slo_violation_webhook: 状态变化时异步 POST {entered,resolved};有界队列+4 worker。
  # 持续违规不重复投递。尽力而为:shutdown 不等待;日志仅 scheme://host。
  slo_cache_hit_rate_min: 0.2
  slo_upstream_error_rate_max: 0.05
  slo_p99_latency_max_ms: 30000
  slo_check_interval_seconds: 60
  slo_violation_webhook:

# 路由仅按 models 匹配 body.model；请保证各 provider 的 models 互不重叠。
# 客户端使用标准 path:
#   OpenAI:  POST /v1/chat/completions|/v1/responses|/v1/completions|/v1/embeddings, GET/POST /v1/models
#   Anthropic: POST /v1/messages
# 已禁用 X-AI-Provider / ?provider= / provider/model 显式选择。
providers:
  # 每个 enabled provider 必须显式声明 endpoint_capabilities(不从 protocol 推断)
  openai:
    enabled: true
    protocol: openai
    # base_url 可带或不带 /v1；代理会按入站 path 智能拼接并去重。
    base_url: https://onlycode.shop/v1
    api_key: ${OPENAI_API_KEY}
    endpoint_capabilities: chat_completions, responses, completions, embeddings
    models: gpt-*, chatgpt-*, o*, text-embedding-*
  deepseek:
    enabled: true
    protocol: openai
    base_url: https://api.deepseek.com
    api_key: ${DEEPSEEK_API_KEY}
    endpoint_capabilities: chat_completions, responses, completions, embeddings
    models: deepseek*
  anthropic:
    enabled: true
    protocol: anthropic
    # 转换与直通均走统一 path join；带/不带 /v1 均可。
    base_url: https://onlycode.shop
    api_key: ${ANTHROPIC_API_KEY}
    endpoint_capabilities: messages
    models: claude*

# 全局模型目录(各 provider 共用)。GET /v1/models 仅返回此处登记的模型,
# 并附带 contextWindowTokens / maxOutputTokens / operations。model_catalog 是路由与能力的共同 authority。
model_catalog:
  gpt-4o:
    context_window_tokens: 128000
    max_output_tokens: 16384
    operations: chat_completions
  deepseek-chat:
    context_window_tokens: 64000
    max_output_tokens: 8192
    operations: chat_completions
  claude-sonnet-4-20250514:
    context_window_tokens: 200000
    max_output_tokens: 8192
    operations: chat_completions
  text-embedding-3-large:
    context_window_tokens: 8192
    max_output_tokens: 8191
    operations: embeddings
